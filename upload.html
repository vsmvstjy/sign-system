<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>경기대학교 전자서명 시스템 - 관리자</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: sans-serif; margin: 0; background: #f9f9f9; }
    header { background: #002D72; padding: 14px 24px; display: flex; align-items: center; gap: 16px; }
    header img { height: 44px; }
    header .title-wrap { color: white; }
    header .title-wrap .sub { font-size: 11px; opacity: 0.75; letter-spacing: 0.5px; }
    header .title-wrap .main { font-size: 17px; font-weight: bold; }
    main { padding: 20px; }
    #pdfArea { text-align: center; }
    #nav { margin-bottom: 10px; }
    #nav button { margin: 10px; padding: 10px 20px; font-size: 16px; border-radius: 6px; border: none; background: #1890ff; color: white; font-weight: bold; cursor: pointer; }
    button:hover { opacity: 0.85; }
    #toolbar { display: none; max-width: 800px; margin: 10px auto; background: white; border: 1px solid #ddd; border-radius: 8px; padding: 12px; text-align: center; }
    #toolbar span { font-weight: bold; margin-right: 8px; font-size: 14px; }
    .tool-btn { padding: 8px 14px; margin: 4px; border-radius: 6px; border: 2px solid #ddd; background: white; cursor: pointer; font-size: 13px; font-weight: bold; }
    .tool-btn[data-type="check"]     { color: #1890ff; }
    .tool-btn[data-type="signature"] { color: #ff5c5c; }
    .tool-btn[data-type="date"]      { color: #52c41a; }
    .tool-btn[data-type="name"]      { color: #722ed1; }
    .tool-btn[data-type="memo"]      { color: #fa8c16; }
    .tool-btn.active[data-type="check"]     { background:#e6f7ff; border-color:#1890ff; }
    .tool-btn.active[data-type="signature"] { background:#fff1f0; border-color:#ff5c5c; }
    .tool-btn.active[data-type="date"]      { background:#f6ffed; border-color:#52c41a; }
    .tool-btn.active[data-type="name"]      { background:#f9f0ff; border-color:#722ed1; }
    .tool-btn.active[data-type="memo"]      { background:#fff7e6; border-color:#fa8c16; }
    #canvasWrap { position: relative; display: inline-block; cursor: crosshair; user-select: none; }
    canvas { display: block; border: 1px solid #ccc; }
    .field-marker { position: absolute; border-radius: 4px; text-align: center; font-weight: bold; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    #fieldList { max-width: 700px; margin: 12px auto; }
    #fieldList p { text-align: center; color: #888; font-size: 13px; }
    .field-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 14px; background: white; border: 1px solid #eee; border-radius: 6px; margin: 4px 0; font-size: 13px; }
    .del-btn { background: #ff4d4f; color: white; border: none; border-radius: 4px; padding: 4px 10px; cursor: pointer; font-size: 12px; }
    #formArea { max-width: 500px; margin: 20px auto; text-align: center; }
    #formArea input, #formArea button { width: 100%; margin: 8px 0; padding: 10px; font-size: 14px; }
    #linkOutput { text-align: center; word-break: break-word; margin-top: 10px; }
    footer { text-align: center; padding: 16px; font-size: 12px; color: #999; border-top: 1px solid #e8e8e8; margin-top: 40px; }
  </style>
</head>
<body>
  <header>
    <img src="logo.png" alt="경기대학교 로고">
    <div class="title-wrap">
      <div class="sub">KYONGGI UNIVERSITY</div>
      <div class="main">연구지원팀 전자서명 시스템</div>
    </div>
  </header>
  <main>
    <div id="pdfArea">
      <div id="nav">
        <button id="prevPage">이전 페이지</button>
        <span id="pageInfo">Page 0/0</span>
        <button id="nextPage">다음 페이지</button>
      </div>
      <div id="toolbar">
        <span>추가할 필드:</span>
        <button class="tool-btn active" data-type="check">☑ 체크(√)</button>
        <button class="tool-btn" data-type="signature">✍ 서명</button>
        <button class="tool-btn" data-type="date">📅 날짜</button>
        <button class="tool-btn" data-type="name">👤 이름</button>
        <button class="tool-btn" data-type="memo">📝 메모(드래그)</button>
      </div>
      <div id="canvasWrap">
        <canvas id="pdfCanvas"></canvas>
      </div>
    </div>
    <div id="fieldList"></div>
    <div id="formArea">
      <input type="text" id="docTitle" placeholder="문서 제목">
      <input type="email" id="receiver" placeholder="회신 받을 이메일">
      <input type="file" id="pdfFile" accept="application/pdf">
      <button id="generate">링크 생성</button>
      <p id="linkOutput"></p>
    </div>
  </main>
  <footer>개발 · 운영: 경기대학교 연구지원팀 이주영</footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
  <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';</script>
  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
  <script type="module">
    import { db } from './firebase-config.js';
    import { doc, setDoc, Timestamp } from 'https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js';

    const RENDER_SCALE = 1.2;
    let pdfDoc, currentPage = 1, totalPages = 0, pdfBase64 = '';
    let fields = [];
    let selectedType = 'check';

    const canvas = document.getElementById('pdfCanvas');
    const ctx = canvas.getContext('2d');
    const canvasWrap = document.getElementById('canvasWrap');
    const pageInfo = document.getElementById('pageInfo');

    const FIELD_CONFIG = {
      check:     { color: '#1890ff', label: '☑ 체크', w: 40, h: 25 },
      signature: { color: '#ff5c5c', label: '✍ 서명', w: 80, h: 30 },
      date:      { color: '#52c41a', label: '📅 날짜', w: 80, h: 25 },
      name:      { color: '#722ed1', label: '👤 이름', w: 80, h: 25 },
      memo:      { color: '#fa8c16', label: '📝 메모' },
    };

    document.querySelectorAll('.tool-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedType = btn.dataset.type;
      });
    });

    // 압축 기능 제거 및 용량 제한 로직 교체
    document.getElementById('pdfFile').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;

      // 750KB 초과 시 업로드 차단
      if (file.size > 750 * 1024) {
        alert(`파일 용량이 너무 큽니다 (${(file.size / 1024).toFixed(0)}KB).\n750KB 이하의 PDF만 사용 가능합니다.`);
        e.target.value = '';
        return;
      }

      const reader = new FileReader();
      reader.onload = async () => {
        pdfBase64 = reader.result.split(',')[1];
        const raw = Uint8Array.from(atob(pdfBase64), c => c.charCodeAt(0));
        
        pdfDoc = await pdfjsLib.getDocument({data: raw}).promise;
        totalPages = pdfDoc.numPages;
        currentPage = 1;
        
        // 다른 기능 유지를 위한 상태 초기화 및 렌더링 호출
        fields = [];
        document.getElementById('toolbar').style.display = 'block';
        await renderPage(currentPage);
      };
      reader.readAsDataURL(file);
    });

    async function renderPage(n) {
      currentPage = n;
      const page = await pdfDoc.getPage(n);
      const vp = page.getViewport({ scale: RENDER_SCALE });
      canvas.width = vp.width;
      canvas.height = vp.height;
      await page.render({ canvasContext: ctx, viewport: vp }).promise;
      pageInfo.textContent = `Page ${n}/${totalPages}`;
      renderMarkers();
    }

    function renderMarkers() {
      document.querySelectorAll('.field-marker').forEach(el => el.remove());
      fields.forEach((field, idx) => {
        if (field.page !== currentPage) return;
        const cfg = FIELD_CONFIG[field.type];
        const div = document.createElement('div');
        div.className = 'field-marker';
        let cssX, cssY, w, h;
        if (field.type === 'memo') {
          cssX = field.posX * RENDER_SCALE;
          cssY = field.posY * RENDER_SCALE;
          w = field.w * RENDER_SCALE;
          h = field.h * RENDER_SCALE;
        } else {
          cssX = field.posX * RENDER_SCALE - cfg.w/2;
          cssY = field.posY * RENDER_SCALE - cfg.h/2;
          w = cfg.w; h = cfg.h;
        }
        div.style.cssText = `left:${cssX}px; top:${cssY}px; width:${w}px; height:${h}px;
          background:${cfg.color}33; border:2px dashed ${cfg.color}; color:${cfg.color};`;
        div.textContent = cfg.label;
        div.title = '클릭하여 삭제';
        div.addEventListener('click', e => {
          e.stopPropagation();
          fields.splice(idx, 1);
          renderMarkers();
          renderFieldList();
        });
        canvasWrap.appendChild(div);
      });
    }

    function renderFieldList() {
      const list = document.getElementById('fieldList');
      list.innerHTML = '';
      if (fields.length === 0) return;
      const p = document.createElement('p');
      p.textContent = '추가된 필드 (마커 클릭 또는 삭제 버튼으로 제거):';
      list.appendChild(p);
      fields.forEach((field, idx) => {
        const cfg = FIELD_CONFIG[field.type];
        const item = document.createElement('div');
        item.className = 'field-item';
        item.innerHTML = `<span style="color:${cfg.color}">${cfg.label}</span><span>${field.page}페이지</span><button class="del-btn">삭제</button>`;
        item.querySelector('.del-btn').addEventListener('click', () => {
          fields.splice(idx, 1);
          renderMarkers(); renderFieldList();
        });
        list.appendChild(item);
      });
    }

    let dragStart = null, dragRect = null;

    canvas.addEventListener('mousedown', e => {
      if (!pdfDoc) return;
      const rect = canvas.getBoundingClientRect();
      dragStart = { x: e.clientX - rect.left, y: e.clientY - rect.top };
      if (selectedType === 'memo') {
        dragRect = document.createElement('div');
        dragRect.style.cssText = `position:absolute; left:${dragStart.x}px; top:${dragStart.y}px;
          width:0; height:0; border:2px dashed #fa8c16; background:rgba(250,140,22,0.2); pointer-events:none;`;
        canvasWrap.appendChild(dragRect);
      }
    });

    canvas.addEventListener('mousemove', e => {
      if (!dragStart || !dragRect || selectedType !== 'memo') return;
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left, y = e.clientY - rect.top;
      const left = Math.min(dragStart.x, x), top = Math.min(dragStart.y, y);
      const w = Math.abs(x - dragStart.x), h = Math.abs(y - dragStart.y);
      dragRect.style.left = `${left}px`; dragRect.style.top = `${top}px`;
      dragRect.style.width = `${w}px`; dragRect.style.height = `${h}px`;
    });

    canvas.addEventListener('mouseup', e => {
      if (!pdfDoc || !dragStart) return;
      const rect = canvas.getBoundingClientRect();
      const endX = e.clientX - rect.left, endY = e.clientY - rect.top;
      const dx = Math.abs(endX - dragStart.x), dy = Math.abs(endY - dragStart.y);
      const ratio = canvas.width / rect.width;

      if (selectedType === 'memo') {
        if (dragRect) dragRect.remove();
        if (dx > 10 && dy > 10) {
          fields.push({
            type: 'memo', page: currentPage,
            posX: Math.min(dragStart.x, endX) * ratio / RENDER_SCALE,
            posY: Math.min(dragStart.y, endY) * ratio / RENDER_SCALE,
            w: dx * ratio / RENDER_SCALE, h: dy * ratio / RENDER_SCALE,
          });
          renderMarkers(); renderFieldList();
        }
      } else if (dx < 5 && dy < 5) {
        fields.push({
          type: selectedType, page: currentPage,
          posX: endX * ratio / RENDER_SCALE,
          posY: endY * (canvas.height / rect.height) / RENDER_SCALE,
        });
        renderMarkers(); renderFieldList();
      }
      dragStart = null; dragRect = null;
    });

    document.getElementById('prevPage').onclick = () => { if (currentPage > 1) renderPage(--currentPage); };
    document.getElementById('nextPage').onclick = () => { if (currentPage < totalPages) renderPage(++currentPage); };

    document.getElementById('generate').onclick = async () => {
      const title = document.getElementById('docTitle').value;
      const receiver = document.getElementById('receiver').value;
      if (!title || !receiver || !pdfBase64) return alert('모두 입력해주세요');
      if (fields.length === 0) return alert('필드를 하나 이상 추가해주세요');
      const id = Math.random().toString(36).substr(2, 10);
      const twoDaysLater = Timestamp.fromDate(new Date(Date.now() + 2 * 24 * 60 * 60 * 1000));
      await setDoc(doc(db, 'signRequests', id), {
        docTitle: title, receiver, pdfBase64, fields,
        createdAt: Timestamp.now(), expiresAt: twoDaysLater
      });
      const url = `${window.location.origin}/sign.html?id=${id}`;
      document.getElementById('linkOutput').innerHTML = `<a href="${url}" target="_blank">${url}</a>`;
    };
  </script>
</body>
</html>
